<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Dark background gradient -->
    <radialGradient id="bgGradW" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1f35"/>
      <stop offset="100%" stop-color="#080e1a"/>
    </radialGradient>

    <!-- Node glow effects -->
    <radialGradient id="ngBlueW" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngGreenW" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngPurpleW" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Center orb gradient -->
    <radialGradient id="centerOrbW" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4aaeff"/>
      <stop offset="45%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1e33"/>
    </radialGradient>

    <filter id="glowW" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlowW" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlowW" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vertical divider gradient -->
    <linearGradient id="divGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bgGradW)" rx="14"/>

  <!-- Subtle grid lines on icon side only -->
  <g opacity="0.06" stroke="#4a90d9" stroke-width="0.5">
    <line x1="0"   y1="40"  x2="195" y2="40"/>
    <line x1="0"   y1="80"  x2="195" y2="80"/>
    <line x1="0"   y1="120" x2="195" y2="120"/>
    <line x1="0"   y1="160" x2="195" y2="160"/>
    <line x1="40"  y1="0"   x2="40"  y2="200"/>
    <line x1="80"  y1="0"   x2="80"  y2="200"/>
    <line x1="120" y1="0"   x2="120" y2="200"/>
    <line x1="160" y1="0"   x2="160" y2="200"/>
  </g>

  <!-- ===== ICON SECTION (left, centered at ~100, 100) ===== -->
  <!--
    Node positions scaled to fit ~160x160 area centered at (100, 100):
    Center:        (100, 100)
    Top:           (100, 35)
    Top-Left:      (49,  62)
    Top-Right:     (151, 62)
    Left:          (27,  100)
    Right:         (173, 100)
    Bottom-Left:   (49,  138)
    Bottom-Right:  (151, 138)
    Bottom:        (100, 165)
  -->

  <!-- Outer ring connections -->
  <g stroke="#1e3a5f" stroke-width="1.2" opacity="0.5" fill="none">
    <line x1="100" y1="35"  x2="151" y2="62"/>
    <line x1="151" y1="62"  x2="173" y2="100"/>
    <line x1="173" y1="100" x2="151" y2="138"/>
    <line x1="151" y1="138" x2="100" y2="165"/>
    <line x1="100" y1="165" x2="49"  y2="138"/>
    <line x1="49"  y1="138" x2="27"  y2="100"/>
    <line x1="27"  y1="100" x2="49"  y2="62"/>
    <line x1="49"  y1="62"  x2="100" y2="35"/>
  </g>

  <!-- Glowing spoke connections from center -->
  <g fill="none" filter="url(#glowW)">
    <line x1="100" y1="100" x2="100" y2="35"  stroke="#10b981" stroke-width="1.1" opacity="0.75"/>
    <line x1="100" y1="100" x2="151" y2="62"  stroke="#3b82f6" stroke-width="1.1" opacity="0.75"/>
    <line x1="100" y1="100" x2="173" y2="100" stroke="#a78bfa" stroke-width="1.1" opacity="0.65"/>
    <line x1="100" y1="100" x2="151" y2="138" stroke="#3b82f6" stroke-width="1.1" opacity="0.65"/>
    <line x1="100" y1="100" x2="100" y2="165" stroke="#10b981" stroke-width="1.1" opacity="0.75"/>
    <line x1="100" y1="100" x2="49"  y2="138" stroke="#a78bfa" stroke-width="1.1" opacity="0.65"/>
    <line x1="100" y1="100" x2="27"  y2="100" stroke="#3b82f6" stroke-width="1.1" opacity="0.75"/>
    <line x1="100" y1="100" x2="49"  y2="62"  stroke="#10b981" stroke-width="1.1" opacity="0.75"/>
    <!-- Cross connections -->
    <line x1="49"  y1="62"  x2="151" y2="62"  stroke="#1e3a5f" stroke-width="0.8" opacity="0.8"/>
    <line x1="27"  y1="100" x2="173" y2="100" stroke="#1e3a5f" stroke-width="0.8" opacity="0.6"/>
    <line x1="49"  y1="138" x2="151" y2="138" stroke="#1e3a5f" stroke-width="0.8" opacity="0.6"/>
    <line x1="49"  y1="62"  x2="27"  y2="100" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <line x1="151" y1="62"  x2="173" y2="100" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Node glow halos -->
  <circle cx="100" cy="100" r="24" fill="url(#ngBlueW)"   opacity="0.9"/>
  <circle cx="100" cy="35"  r="15" fill="url(#ngGreenW)"  opacity="0.8"/>
  <circle cx="151" cy="62"  r="13" fill="url(#ngBlueW)"   opacity="0.7"/>
  <circle cx="173" cy="100" r="13" fill="url(#ngPurpleW)" opacity="0.7"/>
  <circle cx="151" cy="138" r="13" fill="url(#ngBlueW)"   opacity="0.7"/>
  <circle cx="100" cy="165" r="13" fill="url(#ngGreenW)"  opacity="0.7"/>
  <circle cx="49"  cy="138" r="13" fill="url(#ngPurpleW)" opacity="0.7"/>
  <circle cx="27"  cy="100" r="13" fill="url(#ngBlueW)"   opacity="0.7"/>
  <circle cx="49"  cy="62"  r="13" fill="url(#ngGreenW)"  opacity="0.7"/>

  <!-- Outer nodes -->
  <g filter="url(#softGlowW)">
    <circle cx="100" cy="35"  r="7"   fill="#0a2240" stroke="#10b981" stroke-width="1.8"/>
    <circle cx="100" cy="35"  r="3"   fill="#10b981"/>
    <circle cx="151" cy="62"  r="6.5" fill="#0a2240" stroke="#3b82f6" stroke-width="1.6"/>
    <circle cx="151" cy="62"  r="2.8" fill="#3b82f6"/>
    <circle cx="173" cy="100" r="6.5" fill="#0a2240" stroke="#a78bfa" stroke-width="1.6"/>
    <circle cx="173" cy="100" r="2.8" fill="#a78bfa"/>
    <circle cx="151" cy="138" r="6.5" fill="#0a2240" stroke="#3b82f6" stroke-width="1.6"/>
    <circle cx="151" cy="138" r="2.8" fill="#3b82f6"/>
    <circle cx="100" cy="165" r="7"   fill="#0a2240" stroke="#10b981" stroke-width="1.8"/>
    <circle cx="100" cy="165" r="3"   fill="#10b981"/>
    <circle cx="49"  cy="138" r="6.5" fill="#0a2240" stroke="#a78bfa" stroke-width="1.6"/>
    <circle cx="49"  cy="138" r="2.8" fill="#a78bfa"/>
    <circle cx="27"  cy="100" r="6.5" fill="#0a2240" stroke="#3b82f6" stroke-width="1.6"/>
    <circle cx="27"  cy="100" r="2.8" fill="#3b82f6"/>
    <circle cx="49"  cy="62"  r="6.5" fill="#0a2240" stroke="#10b981" stroke-width="1.6"/>
    <circle cx="49"  cy="62"  r="2.8" fill="#10b981"/>
  </g>

  <!-- Central hub node -->
  <g filter="url(#softGlowW)">
    <circle cx="100" cy="100" r="17"  fill="#0a2240" stroke="#3b82f6" stroke-width="2.2"/>
    <circle cx="100" cy="100" r="12"  fill="url(#centerOrbW)"/>
    <circle cx="100" cy="100" r="7.5" fill="none" stroke="#4aaeff" stroke-width="0.8" opacity="0.6"/>
    <circle cx="100" cy="100" r="3"   fill="#7dd3fc"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="205" y1="20" x2="205" y2="180" stroke="url(#divGrad)" stroke-width="1"/>

  <!-- ===== TEXT SECTION (right side, starting ~225) ===== -->

  <!-- "YGN" — large primary text -->
  <text
    x="228" y="96"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-2"
    fill="#e8f4ff"
    filter="url(#textGlowW)"
  >YGN</text>

  <!-- Horizontal separator -->
  <line x1="228" y1="108" x2="572" y2="108" stroke="#1e3a5f" stroke-width="1" opacity="0.7"/>

  <!-- "STEM" accent text -->
  <text
    x="231" y="135"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="7"
    fill="#10b981"
  >STEM</text>

  <!-- Tagline -->
  <text
    x="231" y="158"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    font-weight="400"
    letter-spacing="1.5"
    fill="#4a6fa5"
    opacity="0.9"
  >ADAPTIVE AGENT FABRIC</text>

  <!-- Small purple dot accent between STEM and tagline -->
  <circle cx="371" cy="145" r="2" fill="#a78bfa" opacity="0.7"/>

</svg>
